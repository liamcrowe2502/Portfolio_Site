<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Liam's personal portfolio website featuring projects, professional background, resume, and contact information." />
    <title>Portfolio | Contact</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrapper">
        <a class="logo" href="index.html">MyPortfolio</a>
        <button class="menu-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primary-nav">
          ☰
        </button>
        <nav id="primary-nav" class="site-nav">
          <a href="index.html">Home</a>
          <a href="projects.html">Projects</a>
          <a class="active" href="contact.html">Contact Me</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      <h1>Contact Me</h1>
      <p>Let's connect! Fill out the form below.</p>

      <form class="contact-form" action="#" method="post">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="button">Send Message</button>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="index.html">Home</a>
          <a href="projects.html">Projects</a>
          <a href="contact.html">Contact Me</a>
        </nav>

        <div class="social-links" aria-label="Social media links">
          <a href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in" aria-hidden="true"></i></a>
          <a href="mailto:liam@example.com" aria-label="Email"><i class="fa-solid fa-envelope" aria-hidden="true"></i></a>
          <a href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fa-brands fa-github" aria-hidden="true"></i></a>
          <a href="https://www.twitch.tv" target="_blank" rel="noopener noreferrer" aria-label="Twitch"><i class="fa-brands fa-twitch" aria-hidden="true"></i></a>
          <a href="https://www.tiktok.com" target="_blank" rel="noopener noreferrer" aria-label="TikTok"><i class="fa-brands fa-tiktok" aria-hidden="true"></i></a>
        </div>

        <p>&copy; 2026 Liam Portfolio. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
